<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Head / body rounded square -->
  <rect x="8" y="12" width="48" height="40" rx="12" fill="#6366F1"/>
  <!-- Antenna -->
  <line x1="32" y1="12" x2="32" y2="4" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="3" r="3" fill="#A5B4FC"/>
  <!-- Left eye -->
  <circle cx="22" cy="30" r="5" fill="white"/>
  <circle cx="23" cy="29" r="2.5" fill="#1E1B4B"/>
  <!-- Right eye -->
  <circle cx="42" cy="30" r="5" fill="white"/>
  <circle cx="43" cy="29" r="2.5" fill="#1E1B4B"/>
  <!-- Smile -->
  <path d="M24 40 Q32 47 40 40" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Left ear -->
  <rect x="2" y="24" width="6" height="12" rx="3" fill="#818CF8"/>
  <!-- Right ear -->
  <rect x="56" y="24" width="6" height="12" rx="3" fill="#818CF8"/>
</svg>
